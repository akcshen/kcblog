name: Build And Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Setup Node.js 16.13.0
        uses: actions/setup-node@master
        with:
          node-version: "16.14.2"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Build
        run: npm install && npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
          ACCESS_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          BRANCH: gh-pages
          FOLDER: docs/.vuepress/dist

      # 部署完成后将站点链接提交给百度站长（token 放在仓库 Secrets，勿写入代码）
      - name: Submit URLs to Baidu
        env:
          BAIDU_PUSH_SITE: https://kcshen.cn
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
        run: |
          node utils/baiduPush.js https://kcshen.cn
          bash baiduPush.sh